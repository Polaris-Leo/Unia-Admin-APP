<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Unia 管理工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #111; color: #e8e8e8;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .page {
      width: 100%; max-width: 460px;
      display: flex; flex-direction: column; align-items: center; gap: 32px;
      padding: 0 32px;
      -webkit-app-region: no-drag;
    }

    /* ── 品牌 ── */
    .brand { text-align: center; }
    .brand-name {
      font-size: 40px; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, #fb7299, #f0547a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-sub  { font-size: 16px; font-weight: 500; color: #ccc; margin: 6px 0 4px; }

    /* ── 表单 ── */
    .form { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .form-label { font-size: 13px; color: #888; }
    .form-input {
      padding: 11px 14px; width: 100%;
      background: #1a1a1a; border: 1.5px solid #333; border-radius: 8px;
      color: #e8e8e8; font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: #fb7299; }
    .btn-connect {
      width: 100%; padding: 11px; background: #fb7299; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-connect:hover { background: #f0547a; }

    /* ── 加载状态 ── */
    .loading { display: none; flex-direction: column; align-items: center; gap: 14px; }
    .loading.open { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #2a2a2a; border-top-color: #fb7299;
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #888; font-size: 14px; }
  </style>
</head>
<body>
<div class="page">
  <div class="brand">
    <div class="brand-name">Unia</div>
    <div class="brand-sub">弹幕管理工具</div>
  </div>

  <form class="form" id="form" onsubmit="submit(event)">
    <div class="form-label">后端服务器地址</div>
    <input id="urlInput" class="form-input" type="url"
      placeholder="https://your-server.example.com" autocomplete="off">
    <button type="submit" class="btn-connect">连接服务器</button>
  </form>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">正在连接服务器，请稍候…</div>
  </div>
</div>
<script>
  const autoConnect = new URLSearchParams(location.search).get('autoConnect');
  if (autoConnect) {
    document.getElementById('form').style.display = 'none';
    document.getElementById('loading').classList.add('open');
  } else {
    setTimeout(() => {
      const input = document.getElementById('urlInput');
      input.focus(); input.select();
    }, 50);
  }

  function submit(e) {
    e.preventDefault();
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;
    document.getElementById('form').style.display = 'none';
    document.getElementById('loading').classList.add('open');
    window.modeSelectAPI.selectRemote(url);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') window.close();
  });
</script>
</body>
</html>
