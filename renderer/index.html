<!DOCTYPE html>
<html data-theme="dark" lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unia 弹幕悬浮窗</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── 登录视图 ── -->
<div id="login-view" class="view">
  <div class="header drag">
    <span class="title">Unia 弹幕悬浮窗</span>
    <div class="win-btns no-drag">
      <button class="win-btn" id="lv-minimize">─</button>
      <button class="win-btn close" id="lv-close">✕</button>
    </div>
  </div>
  <div class="login-body">
    <div class="field">
      <label>服务器地址</label>
      <input id="server-input" type="text" placeholder="http://localhost:3001" autocomplete="off">
    </div>
    <div class="field">
      <label>用户名</label>
      <input id="username-input" type="text" autocomplete="username">
    </div>
    <div class="field">
      <label>密码</label>
      <input id="password-input" type="password" autocomplete="current-password">
    </div>
    <div id="login-error" class="error"></div>
    <button id="login-btn" class="btn-primary">连接</button>
  </div>
</div>

<!-- ── 主视图 ── -->
<div id="main-view" class="view hidden">
  <div class="header drag">
    <div class="header-left no-drag">
      <span id="conn-status" class="conn-dot"></span>
      <span class="title">弹幕监控</span>
      <span id="msg-count" class="count">0 条</span>
    </div>
    <div class="win-btns no-drag">
      <button id="pin-btn"      class="icon-btn active" title="始终置顶（点击切换）">📌</button>
      <button id="theme-btn"    class="icon-btn" title="切换主题">☽</button>
      <button id="settings-btn" class="icon-btn" title="设置">⚙</button>
      <button id="logout-btn"   class="icon-btn" title="重新登录">⏏</button>
      <button class="win-btn"   id="mv-minimize">─</button>
      <button class="win-btn close" id="mv-close">✕</button>
    </div>
  </div>

  <!-- 设置面板 -->
  <div id="settings-panel" class="settings-panel">
    <div class="settings-row">
      <label>背景透明度 <span id="opacity-label">85%</span></label>
      <input id="opacity-slider" type="range" min="0.1" max="1" step="0.05" value="0.85">
    </div>
    <div class="settings-row">
      <label>字体大小 <span id="font-size-label">14px</span></label>
      <input id="font-size-slider" type="range" min="11" max="20" step="1" value="14">
    </div>
  </div>

  <!-- 弹幕列表 -->
  <div class="list-wrap">
    <div id="msg-list" class="msg-list"></div>
    <button id="new-msg-btn" class="new-msg-btn hidden">↓ 0 条新消息</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
