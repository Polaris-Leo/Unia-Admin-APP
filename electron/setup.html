<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Unia - 连接远程服务器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a; color: #e8e8e8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 16px; padding: 24px;
    }
    h2 { font-size: 16px; color: #fb7299; }
    p { font-size: 13px; color: #aaa; text-align: center; }
    input {
      width: 100%; padding: 9px 12px;
      border-radius: 6px; border: 1px solid #444;
      background: #2a2a2a; color: #e8e8e8;
      font-size: 14px; outline: none;
    }
    input:focus { border-color: #fb7299; }
    .btns { display: flex; gap: 10px; width: 100%; }
    button {
      flex: 1; padding: 9px; border-radius: 6px;
      border: none; cursor: pointer; font-size: 14px;
    }
    .confirm { background: #fb7299; color: #fff; }
    .cancel  { background: #333; color: #aaa; }
  </style>
</head>
<body>
  <h2>连接远程服务器</h2>
  <p>请输入 Unia-Admin-Bot 后端服务器地址</p>
  <input id="url" type="url" placeholder="http://localhost:3001" value="http://localhost:3001" autocomplete="off">
  <div class="btns">
    <button class="cancel"  onclick="window.setupAPI.cancel()">取消</button>
    <button class="confirm" onclick="submit()">确定</button>
  </div>
  <script>
    document.getElementById('url').focus();
    document.getElementById('url').select();
    document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    function submit() {
      const v = document.getElementById('url').value.trim();
      if (v) window.setupAPI.submit(v);
    }
  </script>
</body>
</html>
